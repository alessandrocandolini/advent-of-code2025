name: Compile and run tests

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # enable manual execution

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stack:

    name: ${{ matrix.os }} / stack ${{ matrix.stack }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        stack: ["3.7.1"]

    steps:

    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Setup Haskell Stack
      id: setup
      uses: haskell-actions/setup@v2
      with:
        enable-stack: true
        stack-no-global: true
        stack-version: ${{ matrix.stack }}

    - name: Cache Stack programs
      id: stack-programs-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.setup.outputs.stack-root }}/programs
        key: ${{ runner.os }}-stack-programs-${{ matrix.stack }}-${{ hashFiles('stack.yaml', 'stack.yaml.lock') }}
        restore-keys: |
          ${{ runner.os }}-stack-programs-${{ matrix.stack }}-

    - name: Cache Stack dependencies
      id: stack-deps-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.setup.outputs.stack-root }}/build-plan
          ${{ steps.setup.outputs.stack-root }}/indices
          ${{ steps.setup.outputs.stack-root }}/pantry
          ${{ steps.setup.outputs.stack-root }}/snapshots
        key: ${{ runner.os }}-stack-deps-${{ matrix.stack }}-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'package.yaml', '*.cabal') }}
        restore-keys: |
          ${{ runner.os }}-stack-deps-${{ matrix.stack }}-

    - name: Install dependencies
      if: (steps.stack-programs-cache.outputs.cache-hit != 'true' || steps.stack-deps-cache.outputs.cache-hit != 'true') && success()
      timeout-minutes: 15
      run: |
        stack build --test --no-run-tests --only-dependencies

    - name: Run tests with coverage
      timeout-minutes: 15
      run: |
        stack test --coverage --fast

    - name: Build
      timeout-minutes: 15
      run: |
        stack build --test --no-run-tests

    - name: Generate coverage report
      uses: 8c6794b6/hpc-codecov-action@v4
      with:
        target: stack:aoc2025-test
        out: ./codecov.json
        verbose: true

    - name: Send coverage report
      uses: codecov/codecov-action@v5
      with:
        files: ./codecov.json
        fail_ci_if_error: false # optional (default = false)
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
